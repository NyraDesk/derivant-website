    <!-- Schema.org FAQPage for SEO & AI -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Come funziona la generazione di presentazioni con SlideRun?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'utente inserisce un brief o un documento. L'AI analizza il contenuto, fa ricerca web per dati aggiornati, crea una struttura logica e genera slide con design professionale rispettando le regole della composizione grafica."
          }
        },
        {
          "@type": "Question",
          "name": "Cosa sono i crediti e come vengono consumati?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "I crediti sono l'unità di misura del sistema. Ogni azione (generare una slide, un testo o un'immagine) consuma una quantità predeterminata di crediti inclusi nel piano mensile."
          }
        },
        {
          "@type": "Question",
          "name": "I crediti scadono?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. I crediti non utilizzati a fine mese non scadono: si accumulano nel tuo account per essere usati quando ne hai più bisogno."
          }
        },
        {
          "@type": "Question",
          "name": "Posso cancellare l'abbonamento in qualsiasi momento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sì. Non ci sono vincoli né contratti a lungo termine. Puoi cancellare il piano Pro o Enterprise con un click dalle impostazioni, mantenendo l'accesso fino alla fine del periodo pagato."
          }
        },
        {
          "@type": "Question",
          "name": "SlideRun supporta i template della mia agenzia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Per esigenze personalizzate e generazione illimitata, contattaci per il Piano Enterprise. Il nostro Custom Template Engine permette di caricare i layout proprietari, garantendo che l'AI generi contenuti perfettamente allineati alla Brand Governance."
          }
        },
        {
          "@type": "Question",
          "name": "Posso tradurre le slide in altre lingue?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Assolutamente sì. Puoi tradurre intere slide o singoli blocchi mantenendo intatti layout e formattazione originali."
          }
        }
      ]
    }
